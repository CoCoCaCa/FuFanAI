name: 🐛 Bug Report
description: 报告FuFanAI的Bug或问题
title: "[Bug] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Report

        感谢您报告Bug！请填写以下信息，帮助我们快速定位和修复问题。

  - type: input
    id: version
    attributes:
      label: 🔖 FuFanAI版本
      description: 你使用的FuFanAI版本号
      placeholder: "例如：2.0.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 💻 操作系统
      options:
        - Windows
        - macOS
        - Linux
        - Web浏览器
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 📝 Bug描述
      description: 请详细描述遇到的问题
      placeholder: "描述你遇到的问题..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 📋 复现步骤
      description: 请列出复现该Bug的步骤
      placeholder: |
        1. 打开FuFanAI
        2. 点击...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ 预期行为
      description: 你期望的行为是什么？
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: ❌ 实际行为
      description: 实际发生了什么？
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 📄 日志/截图
      description: 相关的错误日志或截图（可选）
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: ☑️ 确认
      options:
        - label: 我已确认这是Bug，不是用户操作错误
          required: true